# ------------------------------------------------------------------------------------------------
# naming.full.yaml — reference showing every configurable key of the naming schema
# (default_parameters, index_modifier, enforce_lower_case, patterns, mappings, abbreviations).
# Not wired into main.tf; copy from here as a starting point for a fully custom convention.
# Mirrors modules/naming-schema/convention/default.naming.yaml.
# ------------------------------------------------------------------------------------------------

#
# ################################################################################################
# ## (Optional) Define default parameters.

default_parameters:

#
# ################################################################################################
# ## Define general settings.

index_modifier: 1

enforce_lower_case:
  default: true

  azurerm:
    default: false
    container_registry: true
    storage_account: true
    key_vault: true
    dns_zone: true
    private_dns_zone: true

#
# ################################################################################################
# ## Define the patterns for generating names.

patterns:
  default: "<TYPE>-<LOCATION>-<ENVIRONMENT>-<NAME>-<INDEX;%02s>-<UNIQUE_ID_4>"

  # AzureAD resources have no location — pattern omits <LOCATION>.
  AzureAD:
    default: "<TYPE>-<ENVIRONMENT>-<NAME>-<INDEX;%02s>"

  Azure:
    default: "<TYPE>-<LOCATION>-<ENVIRONMENT>-<NAME><?SUBNAME;-%s>-<INDEX;%02s>"

    # ----- Compute / Web ---------------------------------------------------
    # Windows VM names are limited to 15 characters - keep the pattern tight.
    Microsoft.Compute/virtualMachines:
      default: "<TYPE><ENVIRONMENT><NAME><INDEX;%02s>"
      # <name_id>: "<pattern>"
      # <name_kind>: "<pattern>"

    # ----- Containers ------------------------------------------------------
    # Container Registry: 5-50 chars, alphanumeric only (no hyphens).
    Microsoft.ContainerRegistry/registries:
      default: "<TYPE><LOCATION><ENVIRONMENT><NAME><INDEX;%02s>"

    # ----- Management / Governance -----------------------------------------
    Microsoft.Resources/resourceGroups:
      default: "<TYPE>-<LOCATION>-<ENVIRONMENT>-<NAME>-<INDEX;%02s>"

    # ----- Networking ------------------------------------------------------
    Microsoft.Network/virtualNetworks:
      default: "<TYPE>-<LOCATION>-<ENVIRONMENT>-<NAME>-<INDEX;%02s>"

    Microsoft.Network/virtualNetworks/subnets:
      default: "<TYPE>-<ENVIRONMENT>-<NAME>-<INDEX;%02s>"

    Microsoft.Network/publicIPAddresses:
      default: "<TYPE>-<LOCATION>-<ENVIRONMENT>-<NAME>-<INDEX;%02s>"

    Microsoft.Network/networkSecurityGroups:
      default: "<TYPE>-<LOCATION>-<ENVIRONMENT>-<NAME>-<INDEX;%02s>"

    # ----- Security --------------------------------------------------------
    # Key Vault: 3-24 chars, must start with letter, alphanumeric + hyphens.
    Microsoft.KeyVault/vaults:
      default: "<TYPE>-<ENVIRONMENT>-<NAME>-<UNIQUE_ID_4>"

    # ----- Storage ---------------------------------------------------------
    # Storage account: 3-24 chars, alphanumeric only (no hyphens), lowercase.
    Microsoft.Storage/storageAccounts:
      default: "<TYPE><LOCATION><ENVIRONMENT><NAME><INDEX;%02s>"
      vm_pattern: "<TYPE><LOCATION><ENVIRONMENT><NAME><INDEX;%02s>"
      # <name_id>: "<pattern>"
      # <name_kind>: "<pattern>"

#
# ################################################################################################
# ## Define any mappings for the schema.

mappings:
  # Use shortened environment names.
  environment:
    development: dev
    staging: stg
    test: tst
    production: prod
    integration: int
    sandbox: sbx
    preproduction: preprod
    pre-production: preprod
    uat: uat
    qa: qa
    demo: demo
    hotfix: hf

  # Map location names to their corresponding shortnames.
  # Codes follow the Azure Verified Modules geo_code convention
  # (Azure/terraform-azurerm-avm-utl-regions, locals.geo.codes.tf.json).
  location:
    global: glb

    # Europe
    westeurope: we
    West Europe: we

    northeurope: ne
    North Europe: ne

    germanynorth: gn
    Germany North: gn

    germanywestcentral: gwc
    Germany West Central: gwc

    francecentral: frc
    France Central: frc

    francesouth: frs
    France South: frs

    switzerlandnorth: szn
    Switzerland North: szn

    switzerlandwest: szw
    Switzerland West: szw

    norwayeast: nwe
    Norway East: nwe

    norwaywest: nww
    Norway West: nww

    swedencentral: sdc
    Sweden Central: sdc

    polandcentral: plc
    Poland Central: plc

    italynorth: itn
    Italy North: itn

    spaincentral: spc
    Spain Central: spc

    # United Kingdom
    uksouth: uks
    UK South: uks

    ukwest: ukw
    UK West: ukw

    # North America
    eastus: eus
    East US: eus

    eastus2: eus2
    East US 2: eus2

    westus: wus
    West US: wus

    westus2: wus2
    West US 2: wus2

    westus3: wus3
    West US 3: wus3

    centralus: cus
    Central US: cus

    canadacentral: cnc
    Canada Central: cnc

    canadaeast: cne
    Canada East: cne

    # Asia / Pacific
    eastasia: ea
    East Asia: ea

    southeastasia: sea
    Southeast Asia: sea

    japaneast: jpe
    Japan East: jpe

    japanwest: jpw
    Japan West: jpw

    australiaeast: ae
    Australia East: ae

    australiasoutheast: ase
    Australia Southeast: ase

